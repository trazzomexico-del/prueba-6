<script>
const URL_GOOGLE_SHEETS = "https://docs.google.com/spreadsheets/d/1Iffh-VbZUFFYpI5sVI8HQAz6IPgACs_W2sq0iEH4iVo/export?format=csv";

function inicializarControlInventario() {
    fetch(URL_GOOGLE_SHEETS)
    .then(response => response.text())
    .then(csvText => {
        let filas = csvText.split("\n");
        let mapeo_lotes = {};
        
        filas.forEach(fila => {
            let columnas = fila.split(",");
            if(columnas.length >= 2) {
                // Limpiamos nombres (quita espacios, guiones y mayúsculas)
                let nombreExcel = columnas[0].trim().toLowerCase().replace(/[\s_-]/g, "");
                // Limpiamos el estado
                let estadoExcel = columnas[1].trim().toLowerCase();
                
                if (nombreExcel) {
                    mapeo_lotes[nombreExcel] = estadoExcel;
                }
            }
        });

        let intentos = 0;
        let verificadorHotspots = setInterval(() => {
            intentos++;
            
            if (window.pano && typeof window.pano.getPanoramas === "function") {
                let panos = window.pano.getPanoramas();
                
                if (panos && panos.length > 0) {
                    let seAplicaronCambios = false;

                    panos.forEach(p => {
                        if (typeof p.getHotspots === "function") {
                            let hotspots = p.getHotspots();
                            
                            if (hotspots && hotspots.length > 0) {
                                hotspots.forEach(hotspot => {
                                    let nombreHotspot = hotspot.get("name");
                                    
                                    if (nombreHotspot) {
                                        let nombreHotspotLimpio = nombreHotspot.toLowerCase().replace(/[\s_-]/g, "");
                                        
                                        if (mapeo_lotes[nombreHotspotLimpio]) {
                                            let estado = mapeo_lotes[nombreHotspotLimpio];
                                            
                                            // ROJO: Si dice "vendido" o si dice "rojo"
                                            if (estado.includes("vend") || estado.includes("roj")) {
                                                hotspot.set("fillColor", "#FF0000"); 
                                                hotspot.set("lineColor", "#FF0000");
                                                hotspot.set("fillOpacity", 0.6);
                                            } 
                                            // VERDE: Si dice "disp" o si dice "verd"
                                            else if (estado.includes("disp") || estado.includes("verd")) {
                                                hotspot.set("fillColor", "#00FF00"); 
                                                hotspot.set("lineColor", "#00FF00");
                                                hotspot.set("fillOpacity", 0.6);
                                            }
                                            
                                            if (typeof hotspot.update === "function") hotspot.update();
                                            seAplicaronCambios = true;
                                        }
                                    }
                                });
                            }
                        }
                    });

                    // Cuando detecta y pinta los lotes, frena el bucle para no gastar datos
                    if (seAplicaronCambios || intentos > 40) {
                        clearInterval(verificadorHotspots);
                    }
                }
            }
        }, 500);
    })
    .catch(error => console.error('Error en inventario:', error));
}

if (document.readyState === "complete" || document.readyState === "interactive") {
    inicializarControlInventario();
} else {
    window.addEventListener("DOMContentLoaded", inicializarControlInventario);
}
</script>
